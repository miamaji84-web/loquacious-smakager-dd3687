<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse | International News</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #d32f2f;
            --bg: #ffffff;
            --text: #1a1a1a;
            --border: #e0e0e0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 40px; text-decoration: none; color: var(--text); font-weight: bold; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* নিউজ গ্রিড স্টাইল */
        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .post-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .post-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .post-card img { width: 100%; height: 200px; object-fit: cover; }
        .post-card-content { padding: 15px; }
        .post-card h3 { margin: 0 0 10px 0; font-family: 'Playfair Display', serif; font-size: 20px; }

        /* সিঙ্গেল পোস্ট ভিউ */
        #single-post-view { display: none; padding: 20px; }
        .video-player { width: 100%; max-height: 500px; background: #000; border-radius: 8px; margin-bottom: 20px; }
        .back-btn { background: var(--primary); color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">GLOBAL PULSE</a>
</header>

<div class="container">
    <main id="home-view">
        <h2 style="border-left: 5px solid var(--primary); padding-left: 10px;">World Analysis & Updates</h2>
        <div id="news-container">
            <p>Loading updates from GitHub...</p>
        </div>
    </main>

    <section id="single-post-view">
        <button class="back-btn" onclick="closePost()">← Back to Home</button>
        <h1 id="view-title" style="font-family: 'Playfair Display', serif; font-size: 35px;"></h1>
        
        <div id="video-wrapper">
            </div>

        <img id="view-img" style="width:100%; border-radius:8px; margin-bottom:20px; display:none;">
        <div id="view-content" style="line-height: 1.8; font-size: 18px;"></div>
    </section>
</div>

<script>
    // আপনার সঠিক গিটহাব ইউজারনেম
    const username = 'miamaji84-web'; 
    const repo = 'global-pulse'; 

    async function loadPosts() {
        const container = document.getElementById('news-container');
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/_posts/videos`);
            const files = await response.json();
            container.innerHTML = '';

            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();

                    // ডাটা এক্সট্রাক্ট করা
                    const title = text.match(/title:\s*"(.*)"/)?.[1] || "Untitled";
                    const thumb = text.match(/thumbnail:\s*"(.*)"/)?.[1] || "";
                    const videoFile = text.match(/video_file:\s*"(.*)"/)?.[1] || "";
                    const tags = text.match(/tags:([\s\S]*?)---/)?.[1] || "";
                    const body = text.split('---').pop().trim();

                    // এসইও ট্যাগ লুকিয়ে হেডারে পাঠানো
                    if(tags) {
                        let meta = document.createElement('meta');
                        meta.name = "keywords";
                        meta.content = tags.replace(/-/g, '').trim();
                        document.head.appendChild(meta);
                    }

                    // পোস্ট কার্ড তৈরি
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        ${thumb ? `<img src="${thumb}">` : ''}
                        <div class="post-card-content">
                            <h3>${title}</h3>
                            <p>${body.substring(0, 100)}...</p>
                        </div>
                    `;
                    card.onclick = () => openPost(title, thumb, videoFile, body);
                    container.appendChild(card);
                }
            }
        } catch (e) {
            container.innerHTML = "<p>No posts found. Please check GitHub folder.</p>";
        }
    }

    function openPost(title, thumb, video, content) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('single-post-view').style.display = 'block';
        
        document.getElementById('view-title').innerText = title;
        document.getElementById('view-content').innerHTML = content;

        const videoWrapper = document.getElementById('video-wrapper');
        const viewImg = document.getElementById('view-img');

        if (video) {
            videoWrapper.innerHTML = `<video src="${video}" controls class="video-player" poster="${thumb}"></video>`;
            viewImg.style.display = 'none';
        } else {
            videoWrapper.innerHTML = '';
            viewImg.src = thumb;
            viewImg.style.display = thumb ? 'block' : 'none';
        }
        window.scrollTo(0, 0);
    }

    function closePost() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('single-post-view').style.display = 'none';
        const video = document.querySelector('video');
        if(video) video.pause();
    }

    loadPosts();
</script>

</body>
</html>
